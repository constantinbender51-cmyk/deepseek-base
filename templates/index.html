<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col justify-center items-center p-4">

    <div class="w-full max-w-2xl bg-white rounded-lg shadow-lg flex flex-col h-[80vh]">
        <!-- Header -->
        <div class="bg-slate-800 text-white p-4 rounded-t-lg">
            <h1 class="text-xl font-bold">Project "Filter"</h1>
            <p class="text-sm text-gray-300">Unemotional, factual responses only.</p>
        </div>

        <!-- Element 1: Response Field -->
        <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50">
            <div class="text-gray-400 text-center italic mt-10" id="placeholder">
                Waiting for input...
            </div>
        </div>

        <!-- Elements 2 & 3: Text Input & Send Button -->
        <div class="p-4 bg-white border-t rounded-b-lg flex gap-2">
            <input 
                type="text" 
                id="user-input" 
                class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-slate-500"
                placeholder="Type your prompt here..."
                autocomplete="off"
            >
            <button 
                id="send-btn" 
                class="bg-slate-800 text-white px-6 py-2 rounded-lg font-semibold hover:bg-slate-700 transition disabled:bg-slate-400"
            >
                Send
            </button>
        </div>
    </div>

    <script>
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBox = document.getElementById('chat-box');
        const placeholder = document.getElementById('placeholder');

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            // Remove placeholder
            if (placeholder) placeholder.style.display = 'none';

            // Disable input while processing
            inputField.value = '';
            inputField.disabled = true;
            sendBtn.disabled = true;

            // Display User Message
            appendMessage('User', text, 'bg-blue-100 text-blue-900 self-end');

            // Add empty container for the incoming streamed response
            const botMessageDiv = appendMessage('Filter', 'Thinking (calling LLM 1)...', 'bg-gray-200 text-gray-900 self-start', true);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_input: text })
                });

                botMessageDiv.textContent = ''; // Clear "Thinking..." text

                // Setup the stream reader
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    botMessageDiv.textContent += chunk;
                    
                    // Auto-scroll to bottom
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch (error) {
                botMessageDiv.textContent = 'Error connecting to server.';
                console.error(error);
            }

            // Re-enable inputs
            inputField.disabled = false;
            sendBtn.disabled = false;
            inputField.focus();
        }

        // Helper to add chat bubbles to the UI
        function appendMessage(sender, text, classes, isStreaming = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col max-w-[80%] ${sender === 'User' ? 'ml-auto items-end' : 'mr-auto items-start'}`;
            
            const label = document.createElement('span');
            label.className = 'text-xs text-gray-500 mb-1';
            label.textContent = sender;
            
            const bubble = document.createElement('div');
            bubble.className = `p-3 rounded-lg shadow-sm whitespace-pre-wrap ${classes}`;
            bubble.textContent = text;
            
            wrapper.appendChild(label);
            wrapper.appendChild(bubble);
            chatBox.appendChild(wrapper);
            
            chatBox.scrollTop = chatBox.scrollHeight;

            return bubble; // Return bubble so we can append text to it during streaming
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter MVP</title>
    <!-- Tailwind to style markdown elements -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- Marked.js for parsing Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col justify-center items-center p-4">

    <div class="w-full max-w-3xl bg-white rounded-lg shadow-lg flex flex-col h-[85vh] relative">
        <!-- Header -->
        <div class="bg-slate-800 text-white p-4 rounded-t-lg flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">Project "Filter"</h1>
                <p class="text-sm text-gray-300">Substantive, intelligent, and refined responses.</p>
            </div>
            <!-- Memory Reset Button -->
            <button id="reset-btn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded text-sm font-semibold transition">
                Reset Memory
            </button>
        </div>

        <!-- Chat Response Field -->
        <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50 pb-6">
            <div class="text-gray-400 text-center italic mt-10" id="placeholder">
                Waiting for input...
            </div>
        </div>

        <!-- Controls: Mode Dropdown, Text Input & Send Button -->
        <div class="p-4 bg-white border-t rounded-b-lg flex flex-col sm:flex-row gap-2">
            <select id="mode-select" class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500 bg-gray-50 text-slate-700 font-semibold cursor-pointer">
                <option value="unfiltered">Unfiltered</option>
                <option value="system_instruction" selected>System Instruction</option>
                <option value="revision">Revision</option>
                <option value="representative">Representative</option>
                <option value="cumulative">Cumulative</option>
            </select>
            
            <input 
                type="text" 
                id="user-input" 
                class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-slate-500"
                placeholder="Type your prompt here..."
                autocomplete="off"
            >
            <button 
                id="send-btn" 
                class="bg-slate-800 text-white px-6 py-2 rounded-lg font-semibold hover:bg-slate-700 transition disabled:bg-slate-400"
            >
                Send
            </button>
        </div>
    </div>

    <script>
        // Configure Marked.js
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const resetBtn = document.getElementById('reset-btn');
        const chatBox = document.getElementById('chat-box');
        const placeholder = document.getElementById('placeholder');
        const modeSelect = document.getElementById('mode-select');

        // Handle Memory Reset
        resetBtn.addEventListener('click', async () => {
            try {
                await fetch('/reset', { method: 'POST' });
                chatBox.innerHTML = '';
                appendMessage('System', 'Memory wiped clean.', 'bg-gray-800 text-white self-center text-sm', false);
            } catch (err) {
                console.error("Failed to reset memory", err);
            }
        });

        async function sendMessage() {
            const text = inputField.value.trim();
            const mode = modeSelect.value;
            
            if (!text) return;
            if (placeholder) placeholder.style.display = 'none';

            inputField.value = '';
            inputField.disabled = true;
            sendBtn.disabled = true;
            modeSelect.disabled = true;

            // User message
            appendMessage('User', text, 'bg-blue-100 text-blue-900 self-end', false);
            
            // Bot message (pre-allocate)
            const { bubble: botMessageDiv, wrapper: messageWrapper } = appendMessage('Filter AI', `Thinking...`, 'bg-gray-200 text-gray-900 self-start', true);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_input: text, mode: mode }) 
                });

                botMessageDiv.innerHTML = ''; 
                botMessageDiv.dataset.raw = '';

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";
                let revisionBuffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 
                    
                    for (const line of lines) {
                        if (!line.trim()) continue;
                        const data = JSON.parse(line);

                        if (data.type === 'chunk') {
                            // Phase 1: Stream original response
                            botMessageDiv.dataset.raw += data.content;
                            botMessageDiv.innerHTML = marked.parse(botMessageDiv.dataset.raw);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        
                        } else if (data.type === 'transition') {
                            // Signal visual transition to Phase 2 (Revision)
                            const badge = document.createElement('div');
                            badge.id = 'revision-badge';
                            badge.className = 'text-xs text-orange-600 mt-2 font-semibold italic';
                            badge.textContent = 'Revising and flagging non-substantive content...';
                            messageWrapper.appendChild(badge);
                            chatBox.scrollTop = chatBox.scrollHeight;

                        } else if (data.type === 'revision_chunk') {
                            // Phase 2: Stream flawed strings & replace in real-time
                            revisionBuffer += data.content;
                            let revLines = revisionBuffer.split('\n');
                            let needsRender = false;

                            while (revLines.length > 1) {
                                let phrase = revLines.shift().trim();
                                if (phrase) {
                                    // Highlight the exact verbatim string
                                    let replacement = `<span style="color: #b91c1c; background-color: #fee2e2; padding: 0 4px; border-radius: 4px; font-weight: bold;">${phrase}</span>`;
                                    botMessageDiv.dataset.raw = botMessageDiv.dataset.raw.split(phrase).join(replacement);
                                    needsRender = true;
                                }
                            }
                            revisionBuffer = revLines[0]; // Retain incomplete chunk
                            
                            if (needsRender) {
                                botMessageDiv.innerHTML = marked.parse(botMessageDiv.dataset.raw);
                            }
                        }
                    }
                }

                // Cleanup trailing revision buffers after stream ends
                if (revisionBuffer.trim()) {
                    let phrase = revisionBuffer.trim();
                    let replacement = `<span style="color: #b91c1c; background-color: #fee2e2; padding: 0 4px; border-radius: 4px; font-weight: bold;">${phrase}</span>`;
                    botMessageDiv.dataset.raw = botMessageDiv.dataset.raw.split(phrase).join(replacement);
                    botMessageDiv.innerHTML = marked.parse(botMessageDiv.dataset.raw);
                }

                const badge = messageWrapper.querySelector('#revision-badge');
                if (badge) badge.textContent = 'Revision complete.';

            } catch (error) {
                botMessageDiv.textContent = 'Error connecting to server.';
                console.error(error);
            }

            inputField.disabled = false;
            sendBtn.disabled = false;
            modeSelect.disabled = false;
            inputField.focus();
        }

        function appendMessage(sender, text, classes, isMarkdown = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col max-w-[85%] ${sender === 'User' ? 'ml-auto items-end' : 'mr-auto items-start'}`;
            
            const label = document.createElement('span');
            label.className = 'text-xs text-gray-500 mb-1';
            label.textContent = sender;
            
            const bubble = document.createElement('div');
            const formatClasses = isMarkdown ? 'prose prose-slate prose-sm max-w-none' : 'whitespace-pre-wrap';
            bubble.className = `p-3 rounded-lg shadow-sm ${formatClasses} ${classes}`;
            
            if (isMarkdown) {
                bubble.dataset.raw = text;
                bubble.innerHTML = marked.parse(text);
            } else {
                bubble.textContent = text;
            }
            
            wrapper.appendChild(label);
            wrapper.appendChild(bubble);
            chatBox.appendChild(wrapper);
            
            chatBox.scrollTop = chatBox.scrollHeight;

            return { bubble, wrapper };
        }

        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter MVP - Debugger</title>
    <!-- Tailwind with Typography plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- Marked.js for parsing Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col justify-center items-center p-4">

    <div class="w-full max-w-3xl bg-white rounded-lg shadow-lg flex flex-col h-[85vh] relative">
        <!-- Header -->
        <div class="bg-slate-800 text-white p-4 rounded-t-lg flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">Project "Filter" (Debug Mode)</h1>
                <p class="text-sm text-gray-300">Unemotional, factual responses only.</p>
            </div>
        </div>

        <!-- Chat Response Field -->
        <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50 pb-6">
            <div class="text-gray-400 text-center italic mt-10" id="placeholder">
                Waiting for input...
            </div>
        </div>

        <!-- Text Input & Send Button -->
        <div class="p-4 bg-white border-t rounded-b-lg flex gap-2">
            <input 
                type="text" 
                id="user-input" 
                class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-slate-500"
                placeholder="Type your prompt here..."
                autocomplete="off"
            >
            <button 
                id="send-btn" 
                class="bg-slate-800 text-white px-6 py-2 rounded-lg font-semibold hover:bg-slate-700 transition disabled:bg-slate-400"
            >
                Send
            </button>
        </div>
    </div>

    <!-- Edit Filter Prompt Modal -->
    <div id="regen-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden flex justify-center items-center z-50">
        <div class="bg-white p-6 rounded-lg shadow-xl w-11/12 max-w-2xl flex flex-col h-[60vh]">
            <h2 class="text-lg font-bold mb-2 text-slate-800">Edit Filter System Prompt</h2>
            <p class="text-xs text-gray-500 mb-3">Changes saved here will apply to this regeneration AND all future messages.</p>
            
            <textarea id="regen-prompt-input" class="flex-1 w-full border rounded p-3 focus:ring-2 focus:ring-slate-500 outline-none resize-none font-mono text-sm leading-relaxed text-gray-800 shadow-inner"></textarea>
            
            <div class="flex justify-between items-center mt-4">
                <button id="reset-prompt-btn" class="text-sm font-medium text-red-600 hover:text-red-800 transition">
                    Reset to Default
                </button>
                
                <div class="flex gap-3">
                    <button id="close-modal-btn" class="px-5 py-2 font-medium bg-gray-200 text-gray-700 rounded hover:bg-gray-300 transition">Cancel</button>
                    <button id="confirm-regen-btn" class="px-5 py-2 font-medium bg-slate-800 text-white rounded hover:bg-slate-700 transition shadow">Save & Regenerate</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Custom Marked.js Renderer to inject a wrapper and a Copy button around code blocks
        const escapeHtml = (str) => {
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#39;');
        };

        const renderer = {
            code(code, infostring, escaped) {
                const lang = (infostring || '').match(/\S*/)[0];
                const langClass = lang ? `language-${lang}` : '';
                const safeCode = escaped ? code : escapeHtml(code);
                
                // Wrapping the code block in a relative div with 'not-prose' so we can apply our own styles safely
                return `
                    <div class="relative group my-4 not-prose">
                        <button class="copy-code-btn absolute top-2 right-2 bg-slate-700 text-slate-300 hover:text-white hover:bg-slate-600 px-2.5 py-1 rounded text-xs transition-all opacity-0 group-hover:opacity-100 focus:opacity-100 shadow z-10" aria-label="Copy code">Copy</button>
                        <pre class="bg-slate-800 text-slate-100 p-4 rounded-lg overflow-x-auto text-sm font-mono leading-normal"><code class="${langClass}">${safeCode}</code></pre>
                    </div>
                `;
            }
        };

        marked.use({ renderer });
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // Global Event Listener for dynamically generated Copy Buttons
        document.addEventListener('click', async (e) => {
            if (e.target.classList.contains('copy-code-btn')) {
                const btn = e.target;
                const wrapper = btn.closest('.relative');
                const codeBlock = wrapper.querySelector('code');
                
                if (codeBlock) {
                    try {
                        // textContent retrieves the unescaped text exactly as intended
                        await navigator.clipboard.writeText(codeBlock.textContent);
                        
                        // Visual feedback
                        btn.textContent = 'Copied!';
                        btn.classList.add('bg-emerald-600', 'text-white');
                        btn.classList.remove('bg-slate-700', 'text-slate-300');
                        
                        setTimeout(() => {
                            btn.textContent = 'Copy';
                            btn.classList.remove('bg-emerald-600', 'text-white');
                            btn.classList.add('bg-slate-700', 'text-slate-300');
                        }, 2000);
                    } catch (err) {
                        console.error('Failed to copy code: ', err);
                        btn.textContent = 'Error';
                    }
                }
            }
        });

        // Chat UI Logic
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBox = document.getElementById('chat-box');
        const placeholder = document.getElementById('placeholder');
        
        const modal = document.getElementById('regen-modal');
        const promptInput = document.getElementById('regen-prompt-input');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const confirmRegenBtn = document.getElementById('confirm-regen-btn');
        const resetPromptBtn = document.getElementById('reset-prompt-btn');

        let currentRegenIndex = null;
        let currentRegenBubble = null;
        let currentInitDataRef = null;

        const DEFAULT_PROMPT = "You are a rigid filter. Your task is to extract ONLY the unemotional, objective factual content from the provided response. Strip away all emotions, opinions, filler words, and conversational fluff, self-referenceing content. Present only the cold, hard factual parts of the response.";
        
        let globalFilterPrompt = localStorage.getItem('customFilterPrompt') || DEFAULT_PROMPT;

        resetPromptBtn.addEventListener('click', () => {
            promptInput.value = DEFAULT_PROMPT;
        });

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            if (placeholder) placeholder.style.display = 'none';

            inputField.value = '';
            inputField.disabled = true;
            sendBtn.disabled = true;

            appendMessage('User', text, 'bg-blue-100 text-blue-900 self-end', false);
            
            const { bubble: botMessageDiv, wrapper: botWrapper } = appendMessage('Filter', 'Thinking (calling LLM 1)...', 'bg-gray-200 text-gray-900 self-start', true);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_input: text,
                        filter_prompt: globalFilterPrompt
                    })
                });

                botMessageDiv.innerHTML = ''; 
                botMessageDiv.dataset.raw = '';

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 
                    
                    for (const line of lines) {
                        if (!line.trim()) continue;
                        const data = JSON.parse(line);

                        if (data.type === 'init') {
                            addDebugControls(data, botMessageDiv, botWrapper);
                        } else if (data.type === 'chunk') {
                            botMessageDiv.dataset.raw += data.content;
                            botMessageDiv.innerHTML = marked.parse(botMessageDiv.dataset.raw);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    }
                }
            } catch (error) {
                botMessageDiv.textContent = 'Error connecting to server.';
                console.error(error);
            }

            inputField.disabled = false;
            sendBtn.disabled = false;
            inputField.focus();
        }

        function appendMessage(sender, text, classes, isMarkdown = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col max-w-[85%] ${sender === 'User' ? 'ml-auto items-end' : 'mr-auto items-start'}`;
            
            const label = document.createElement('span');
            label.className = 'text-xs text-gray-500 mb-1';
            label.textContent = sender;
            
            const bubble = document.createElement('div');
            const formatClasses = isMarkdown ? 'prose prose-slate prose-sm max-w-none' : 'whitespace-pre-wrap';
            bubble.className = `p-3 rounded-lg shadow-sm w-full ${formatClasses} ${classes}`;
            
            if (isMarkdown) {
                bubble.dataset.raw = text;
                bubble.innerHTML = marked.parse(text);
            } else {
                bubble.textContent = text;
            }
            
            wrapper.appendChild(label);
            wrapper.appendChild(bubble);
            chatBox.appendChild(wrapper);
            
            chatBox.scrollTop = chatBox.scrollHeight;

            return { bubble, wrapper };
        }

        function addDebugControls(initData, bubble, wrapper) {
            const controlsDiv = document.createElement('div');
            controlsDiv.className = 'flex gap-3 mt-1 px-1';
            
            const toggleBtn = document.createElement('button');
            toggleBtn.className = 'text-xs font-semibold text-blue-500 hover:text-blue-700 transition';
            toggleBtn.textContent = '[ Show Original ]';
            
            const regenBtn = document.createElement('button');
            regenBtn.className = 'text-xs font-semibold text-emerald-600 hover:text-emerald-800 transition';
            regenBtn.textContent = '[ Edit Prompt & Regenerate ]';
            
            controlsDiv.appendChild(toggleBtn);
            controlsDiv.appendChild(regenBtn);
            wrapper.appendChild(controlsDiv);

            const originalDiv = document.createElement('div');
            originalDiv.className = 'mt-2 p-3 bg-yellow-50 text-yellow-900 border border-yellow-200 rounded text-sm hidden w-full prose prose-yellow prose-sm max-w-none';
            originalDiv.innerHTML = `<strong class="block mb-2 text-xs uppercase text-yellow-700 not-prose">Unfiltered Original Output:</strong>${marked.parse(initData.original_text)}`;
            wrapper.appendChild(originalDiv);

            toggleBtn.addEventListener('click', () => {
                if (originalDiv.classList.contains('hidden')) {
                    originalDiv.classList.remove('hidden');
                    toggleBtn.textContent = '[ Hide Original ]';
                } else {
                    originalDiv.classList.add('hidden');
                    toggleBtn.textContent = '[ Show Original ]';
                }
            });

            regenBtn.addEventListener('click', () => {
                currentRegenIndex = initData.memory_index;
                currentRegenBubble = bubble;
                currentInitDataRef = initData; 
                
                promptInput.value = initData.filter_prompt;
                modal.classList.remove('hidden');
            });
        }

        closeModalBtn.addEventListener('click', () => {
            modal.classList.add('hidden');
        });

        confirmRegenBtn.addEventListener('click', async () => {
            const newPrompt = promptInput.value.trim();
            if (!newPrompt || currentRegenIndex === null) return;
            
            globalFilterPrompt = newPrompt;
            
            if (newPrompt === DEFAULT_PROMPT) {
                localStorage.removeItem('customFilterPrompt');
            } else {
                localStorage.setItem('customFilterPrompt', newPrompt);
            }

            if (currentInitDataRef) {
                currentInitDataRef.filter_prompt = newPrompt; 
            }

            modal.classList.add('hidden');
            
            currentRegenBubble.dataset.raw = '';
            currentRegenBubble.innerHTML = marked.parse('*Regenerating response based on updated rules...*');
            
            try {
                const response = await fetch('/regenerate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        memory_index: currentRegenIndex,
                        new_filter_prompt: newPrompt
                    })
                });

                currentRegenBubble.innerHTML = '';
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 
                    
                    for (const line of lines) {
                        if (!line.trim()) continue;
                        const data = JSON.parse(line);
                        if (data.type === 'chunk') {
                            currentRegenBubble.dataset.raw += data.content;
                            currentRegenBubble.innerHTML = marked.parse(currentRegenBubble.dataset.raw);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    }
                }
            } catch (error) {
                currentRegenBubble.textContent = 'Error during regeneration.';
                console.error(error);
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>

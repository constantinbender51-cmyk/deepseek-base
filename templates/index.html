<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter MVP - Debugger</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col justify-center items-center p-4">

    <div class="w-full max-w-3xl bg-white rounded-lg shadow-lg flex flex-col h-[85vh] relative">
        <div class="bg-slate-800 text-white p-4 rounded-t-lg flex justify-between items-start">
            <div>
                <h1 class="text-xl font-bold">Project "Filter" (Debug Mode)</h1>
                <p class="text-sm text-gray-300">Unemotional, factual responses only.</p>
            </div>
            <div class="flex flex-col gap-2">
                <div class="flex items-center gap-2 justify-end">
                    <label for="gen-model-select" class="text-xs font-medium text-gray-300 uppercase tracking-wide">Model</label>
                    <select id="gen-model-select" class="bg-slate-700 text-white border border-slate-600 text-sm rounded focus:ring-slate-500 focus:border-slate-500 block p-1.5 outline-none cursor-pointer w-48">
                        <option value="deepseek-chat">DeepSeek Chat</option>
                        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
                        <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
                        <option value="qwen-1.5b-local">Qwen 1.5B (Local)</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 justify-end">
                    <label for="filter-model-select" class="text-xs font-medium text-emerald-400 uppercase tracking-wide">Filter</label>
                    <select id="filter-model-select" class="bg-slate-700 text-white border border-slate-600 text-sm rounded focus:ring-emerald-500 focus:border-emerald-500 block p-1.5 outline-none cursor-pointer w-48">
                        <option value="deepseek-chat" selected>DeepSeek Chat</option>
                        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
                        <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
                        <option value="qwen-1.5b-local">Qwen 1.5B (Local)</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 justify-end">
                    <label for="filter-profile-select" class="text-xs font-medium text-amber-400 uppercase tracking-wide">Prompt</label>
                    <select id="filter-profile-select" class="bg-slate-700 text-white border border-slate-600 text-sm rounded focus:ring-amber-500 focus:border-amber-500 block p-1.5 outline-none cursor-pointer w-48">
                        <option value="raw_intelligence">Filter 1: Shorthand Inclusions</option>
                        <option value="objective_factual">Filter 2: Objective Mixing</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50 pb-6">
            <div class="text-gray-400 text-center italic mt-10" id="placeholder">
                Waiting for input...
            </div>
        </div>

        <div class="p-4 bg-white border-t rounded-b-lg flex gap-2">
            <input type="text" id="user-input" class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-slate-500" placeholder="Type your prompt here..." autocomplete="off">
            <button id="send-btn" class="bg-slate-800 text-white px-6 py-2 rounded-lg font-semibold hover:bg-slate-700 transition disabled:bg-slate-400">Send</button>
        </div>
    </div>

    <!-- Edit Filter Prompt Modal -->
    <div id="regen-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden flex justify-center items-center z-50">
        <div class="bg-white p-6 rounded-lg shadow-xl w-11/12 max-w-2xl flex flex-col h-[60vh]">
            <h2 class="text-lg font-bold mb-2 text-slate-800">Edit Filter System Prompt</h2>
            <p class="text-xs text-gray-500 mb-3">Changes saved here will apply to this regeneration AND all future messages. The currently selected Filter model will be used.</p>
            
            <textarea id="regen-prompt-input" class="flex-1 w-full border rounded p-3 focus:ring-2 focus:ring-slate-500 outline-none resize-none font-mono text-sm leading-relaxed text-gray-800 shadow-inner"></textarea>
            
            <div class="flex justify-between items-center mt-4">
                <button id="reset-prompt-btn" class="text-sm font-medium text-red-600 hover:text-red-800 transition">Reset to Profile Default</button>
                <div class="flex gap-3">
                    <button id="close-modal-btn" class="px-5 py-2 font-medium bg-gray-200 text-gray-700 rounded hover:bg-gray-300 transition">Cancel</button>
                    <button id="confirm-regen-btn" class="px-5 py-2 font-medium bg-slate-800 text-white rounded hover:bg-slate-700 transition shadow">Save & Regenerate</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        marked.setOptions({ breaks: true, gfm: true });

        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBox = document.getElementById('chat-box');
        const placeholder = document.getElementById('placeholder');
        
        const genModelSelect = document.getElementById('gen-model-select');
        const filterModelSelect = document.getElementById('filter-model-select');
        const filterProfileSelect = document.getElementById('filter-profile-select');
        
        const modal = document.getElementById('regen-modal');
        const promptInput = document.getElementById('regen-prompt-input');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const confirmRegenBtn = document.getElementById('confirm-regen-btn');
        const resetPromptBtn = document.getElementById('reset-prompt-btn');

        let currentRegenIndex = null;
        let currentRegenBubble = null;
        let currentInitDataRef = null;

        const FILTER_PROMPTS = {
            "raw_intelligence": "You are an intelligent editor. Your task is to rewrite the ORIGINAL RESPONSE to remove emotional, trust-building, sycophantic, or brand-embedding content.\nTo save time and preserve exact formatting, you MUST use a special shorthand to copy approved segments from the ORIGINAL RESPONSE. \nFormat: [START_WORDS...END_WORDS]\n- START_WORDS must be at least 5 exact letters from the beginning of the segment.\n- END_WORDS must be at least 5 exact letters from the end of the segment.\n\nYou can also write your own new text normally anywhere outside the brackets to bridge thoughts together.\n\nExample Original: \"As an AI, I am happy to help! The capital of France is Paris. Let me know if you need more.\"\nExample Output: \"[The cap...Paris.]\"",
            "objective_factual": "You are a factual summarizer. Use the [start...end] shorthand format to extract the exact facts from the original response. If you need to summarize or bridge two facts together, write your own text outside of the brackets."
        };

        let globalFilterPrompt = localStorage.getItem('customFilterPrompt') || FILTER_PROMPTS['raw_intelligence'];

        function syncDropdownWithPrompt(promptText) {
            let matched = false;
            for (const [key, text] of Object.entries(FILTER_PROMPTS)) {
                if (text === promptText) {
                    filterProfileSelect.value = key;
                    matched = true;
                    break;
                }
            }
            
            let customOpt = filterProfileSelect.querySelector('option[value="custom"]');
            if (!matched) {
                if (!customOpt) {
                    customOpt = document.createElement('option');
                    customOpt.value = 'custom';
                    customOpt.textContent = 'Custom (Edited)';
                    filterProfileSelect.appendChild(customOpt);
                }
                filterProfileSelect.value = 'custom';
            } else if (customOpt) {
                customOpt.remove();
            }
        }

        syncDropdownWithPrompt(globalFilterPrompt);

        filterProfileSelect.addEventListener('change', (e) => {
            if (e.target.value !== 'custom') {
                globalFilterPrompt = FILTER_PROMPTS[e.target.value];
                localStorage.setItem('customFilterPrompt', globalFilterPrompt);
            }
        });

        resetPromptBtn.addEventListener('click', () => {
            const presetKey = filterProfileSelect.value === 'custom' ? 'raw_intelligence' : filterProfileSelect.value;
            promptInput.value = FILTER_PROMPTS[presetKey];
        });

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            if (placeholder) placeholder.style.display = 'none';

            const selectedGenModel = genModelSelect.value;
            const selectedFilterModel = filterModelSelect.value;

            inputField.value = '';
            inputField.disabled = true;
            sendBtn.disabled = true;
            genModelSelect.disabled = true;
            filterModelSelect.disabled = true;
            filterProfileSelect.disabled = true;

            appendMessage('User', text, 'bg-blue-100 text-blue-900 self-end', false);
            const { bubble: botMessageDiv, wrapper: botWrapper } = appendMessage('Filter', `*LLM 1 Generating & LLM 2 Extracting...*`, 'bg-gray-200 text-gray-900 self-start', true);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_input: text,
                        filter_prompt: globalFilterPrompt,
                        gen_model: selectedGenModel,
                        filter_model: selectedFilterModel
                    })
                });

                botMessageDiv.innerHTML = ''; 
                botMessageDiv.dataset.raw = '';

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";
                let currentMemoryIndex = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 
                    
                    for (const line of lines) {
                        if (!line.trim()) continue;
                        const data = JSON.parse(line);

                        if (data.type === 'init') {
                            currentMemoryIndex = data.memory_index;
                            addDebugControls(data, botMessageDiv, botWrapper);
                        } else if (data.type === 'deletions') {
                            const extractedDiv = document.getElementById(`extracted-${currentMemoryIndex}`);
                            if (extractedDiv) {
                                const contentSpan = extractedDiv.querySelector('.extracted-content');
                                if (contentSpan) contentSpan.innerHTML = marked.parse(data.content);
                            }
                        } else if (data.type === 'chunk') {
                            botMessageDiv.dataset.raw += data.content;
                            botMessageDiv.innerHTML = marked.parse(botMessageDiv.dataset.raw);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    }
                }
            } catch (error) {
                botMessageDiv.textContent = 'Error connecting to server.';
                console.error(error);
            }

            inputField.disabled = false;
            sendBtn.disabled = false;
            genModelSelect.disabled = false;
            filterModelSelect.disabled = false;
            filterProfileSelect.disabled = false;
            inputField.focus();
        }

        function appendMessage(sender, text, classes, isMarkdown = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col max-w-[85%] ${sender === 'User' ? 'ml-auto items-end' : 'mr-auto items-start'}`;
            
            const label = document.createElement('span');
            label.className = 'text-xs text-gray-500 mb-1';
            label.textContent = sender;
            
            const bubble = document.createElement('div');
            const formatClasses = isMarkdown ? 'prose prose-slate prose-sm max-w-none' : 'whitespace-pre-wrap';
            bubble.className = `p-3 rounded-lg shadow-sm ${formatClasses} ${classes}`;
            
            if (isMarkdown) {
                bubble.dataset.raw = text;
                bubble.innerHTML = marked.parse(text);
            } else {
                bubble.textContent = text;
            }
            
            wrapper.appendChild(label);
            wrapper.appendChild(bubble);
            chatBox.appendChild(wrapper);
            
            chatBox.scrollTop = chatBox.scrollHeight;

            return { bubble, wrapper };
        }

        function addDebugControls(initData, bubble, wrapper) {
            const controlsDiv = document.createElement('div');
            controlsDiv.className = 'flex gap-3 mt-1 px-1';
            
            const toggleBtn = document.createElement('button');
            toggleBtn.className = 'text-xs font-semibold text-blue-500 hover:text-blue-700 transition';
            toggleBtn.textContent = '[ Show Original ]';

            const toggleExtractedBtn = document.createElement('button');
            toggleExtractedBtn.className = 'text-xs font-semibold text-purple-600 hover:text-purple-800 transition';
            toggleExtractedBtn.textContent = '[ Show Filter Shorthand ]';
            
            const regenBtn = document.createElement('button');
            regenBtn.className = 'text-xs font-semibold text-emerald-600 hover:text-emerald-800 transition';
            regenBtn.textContent = '[ Edit Prompt & Regenerate ]';
            
            controlsDiv.appendChild(toggleBtn);
            controlsDiv.appendChild(toggleExtractedBtn);
            controlsDiv.appendChild(regenBtn);
            wrapper.appendChild(controlsDiv);

            const originalDiv = document.createElement('div');
            originalDiv.className = 'mt-2 p-3 bg-yellow-50 text-yellow-900 border border-yellow-200 rounded text-sm hidden w-full prose prose-yellow prose-sm max-w-none';
            originalDiv.innerHTML = `<strong class="block mb-2 text-xs uppercase text-yellow-700 not-prose">Unfiltered Original Output (LLM 1):</strong>${marked.parse(initData.original_text)}`;
            wrapper.appendChild(originalDiv);

            const extractedDiv = document.createElement('div');
            extractedDiv.id = `extracted-${initData.memory_index}`;
            extractedDiv.className = 'mt-2 p-3 bg-purple-50 text-purple-900 border border-purple-200 rounded text-sm hidden w-full prose prose-purple prose-sm max-w-none';
            extractedDiv.innerHTML = `<strong class="block mb-2 text-xs uppercase text-purple-700 not-prose">Raw Filter Output (LLM 2):</strong><span class="extracted-content"><i>Waiting for Filter Model...</i></span>`;
            wrapper.appendChild(extractedDiv);

            toggleBtn.addEventListener('click', () => {
                if (originalDiv.classList.contains('hidden')) {
                    originalDiv.classList.remove('hidden');
                    toggleBtn.textContent = '[ Hide Original ]';
                } else {
                    originalDiv.classList.add('hidden');
                    toggleBtn.textContent = '[ Show Original ]';
                }
            });

            toggleExtractedBtn.addEventListener('click', () => {
                if (extractedDiv.classList.contains('hidden')) {
                    extractedDiv.classList.remove('hidden');
                    toggleExtractedBtn.textContent = '[ Hide Filter Shorthand ]';
                } else {
                    extractedDiv.classList.add('hidden');
                    toggleExtractedBtn.textContent = '[ Show Filter Shorthand ]';
                }
            });

            regenBtn.addEventListener('click', () => {
                currentRegenIndex = initData.memory_index;
                currentRegenBubble = bubble;
                currentInitDataRef = initData; 
                
                promptInput.value = initData.filter_prompt;
                modal.classList.remove('hidden');
            });
        }

        closeModalBtn.addEventListener('click', () => {
            modal.classList.add('hidden');
        });

        confirmRegenBtn.addEventListener('click', async () => {
            const newPrompt = promptInput.value.trim();
            const selectedFilterModel = filterModelSelect.value;

            if (!newPrompt || currentRegenIndex === null) return;
            
            globalFilterPrompt = newPrompt;
            localStorage.setItem('customFilterPrompt', newPrompt);
            syncDropdownWithPrompt(newPrompt);

            if (currentInitDataRef) {
                currentInitDataRef.filter_prompt = newPrompt; 
            }

            modal.classList.add('hidden');
            
            currentRegenBubble.dataset.raw = '';
            currentRegenBubble.innerHTML = marked.parse(`*Extracting & Regenerating...*`);
            
            const extractedDiv = document.getElementById(`extracted-${currentRegenIndex}`);
            if (extractedDiv) {
                const contentSpan = extractedDiv.querySelector('.extracted-content');
                if (contentSpan) contentSpan.innerHTML = `<i>Waiting for Filter Model...</i>`;
            }
            
            try {
                const response = await fetch('/regenerate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        memory_index: currentRegenIndex,
                        new_filter_prompt: newPrompt,
                        filter_model: selectedFilterModel
                    })
                });

                currentRegenBubble.innerHTML = '';
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 
                    
                    for (const line of lines) {
                        if (!line.trim()) continue;
                        const data = JSON.parse(line);
                        
                        if (data.type === 'deletions') {
                            if (extractedDiv) {
                                const contentSpan = extractedDiv.querySelector('.extracted-content');
                                if (contentSpan) contentSpan.innerHTML = marked.parse(data.content);
                            }
                        } else if (data.type === 'chunk') {
                            currentRegenBubble.dataset.raw += data.content;
                            currentRegenBubble.innerHTML = marked.parse(currentRegenBubble.dataset.raw);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    }
                }
            } catch (error) {
                currentRegenBubble.textContent = 'Error during regeneration.';
                console.error(error);
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
